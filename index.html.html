<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Dosi hna 🤍</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; overscroll-behavior: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Comic Sans MS", cursive, sans-serif;
    background: linear-gradient(180deg, #ffe4ef 0%, #ffd1e3 50%, #ffc1d8 100%);
    color: #6b2a48;
    user-select: none; -webkit-user-select: none;
    touch-action: manipulation;
  }
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    text-align: center;
  }
  .layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

  /* Floating hearts background */
  .heart-bg {
    position: absolute; font-size: 22px;
    animation: floatUp linear infinite;
    opacity: .7;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) scale(.6) rotate(0deg); opacity: 0; }
    10%  { opacity: .8; }
    100% { transform: translateY(-15vh) scale(1) rotate(20deg); opacity: 0; }
  }
  .sparkle {
    position: absolute; width: 6px; height: 6px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px 2px #fff, 0 0 16px 4px #ffb6d3;
    animation: twinkle 2.4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(.5); }
    50%     { opacity: 1; transform: scale(1.2); }
  }

  /* Kitten */
  .kitten {
    position: relative;
    width: 180px; height: 180px;
    transition: transform 1.6s cubic-bezier(.22,1,.36,1);
    will-change: transform;
    filter: drop-shadow(0 10px 20px rgba(255,120,170,.35));
  }
  .kitten.walk { animation: bob .6s ease-in-out 4; }
  @keyframes bob {
    0%,100% { transform: translateY(0); }
    50%     { transform: translateY(-8px); }
  }
  .kitten svg { width: 100%; height: 100%; display: block; }

  /* Blink */
  .eye { transition: transform .12s ease; transform-origin: center; }
  .kitten.blink .eye { transform: scaleY(.05); }
  .kitten.happy .mouth { d: path("M75 118 Q100 140 125 118"); }

  /* Buttons */
  .btn {
    appearance: none; border: none; cursor: pointer;
    background: linear-gradient(180deg,#ff8ab8,#ff5fa1);
    color: #fff; font-weight: 700; font-size: 18px;
    padding: 14px 28px; border-radius: 999px;
    box-shadow: 0 8px 20px rgba(255,95,161,.45), inset 0 -3px 0 rgba(0,0,0,.08);
    transition: transform .15s ease, box-shadow .15s ease;
    margin-top: 28px;
    letter-spacing: .3px;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(.95); box-shadow: 0 4px 10px rgba(255,95,161,.35); }
  .btn.secondary { background: linear-gradient(180deg,#fff,#ffe4ef); color:#d6427a; }

  .row { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }

  /* Message */
  .message {
    max-width: 92vw; width: 360px;
    background: rgba(255,255,255,.75);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 22px 20px;
    margin-top: 22px;
    font-size: 17px; line-height: 1.55;
    color: #5b2440;
    box-shadow: 0 20px 40px rgba(214,66,122,.18);
    white-space: pre-wrap;
    min-height: 60px;
    border: 1px solid rgba(255,255,255,.7);
  }
  .caret { display:inline-block; width:2px; background:#d6427a; margin-left:2px; animation: caret .8s steps(1) infinite; vertical-align:-3px; height:1em; }
  @keyframes caret { 50% { opacity: 0; } }

  /* Final glowing heart */
  .glow-heart {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%,-50%) scale(0);
    font-size: 120px;
    filter: drop-shadow(0 0 30px #ff7ab0) drop-shadow(0 0 60px #ff7ab0);
    transition: transform 1s cubic-bezier(.22,1,.36,1);
  }
  .glow-heart.show { transform: translate(-50%,-50%) scale(1); animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { filter: drop-shadow(0 0 20px #ff7ab0) drop-shadow(0 0 40px #ff7ab0); }
    50%     { filter: drop-shadow(0 0 40px #fff) drop-shadow(0 0 80px #ff7ab0); }
  }

  /* Confetti */
  .confetti {
    position: absolute; width: 10px; height: 14px; top: -20px;
    animation: fall linear forwards;
    border-radius: 2px;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: .9; }
  }

  /* Screens */
  .screen { display:none; flex-direction:column; align-items:center; justify-content:center; }
  .screen.active { display:flex; animation: fadeIn .6s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px);} to {opacity:1; transform:none;} }

  h1 { font-size: 26px; margin: 14px 0 0; color:#c43375; }
  p.sub { margin: 6px 0 0; color:#a44a73; font-size: 14px; }

  /* Mute */
  .mute {
    position: absolute; top: calc(env(safe-area-inset-top) + 12px); right: 14px;
    background: rgba(255,255,255,.7); border: none; border-radius: 999px;
    padding: 8px 12px; font-size: 16px; color:#c43375; font-weight:700;
    box-shadow: 0 4px 12px rgba(214,66,122,.2);
  }
</style>
</head>
<body>

<button id="mute" class="mute" aria-label="toggle sound">🔊</button>

<div class="layer" id="bgLayer"></div>
<div class="layer" id="fxLayer"></div>

<div class="stage">

  <!-- Screen 1: intro -->
  <div class="screen active" id="screen1">
    <div class="kitten" id="kitten1">
      <!-- kitten SVG inlined below via JS clone -->
    </div>
    <h1>Hi 🤍</h1>
    <p class="sub">tap to begin</p>
    <button class="btn" id="startBtn">Dosi hna 🤍</button>
  </div>

  <!-- Screen 2: message -->
  <div class="screen" id="screen2">
    <div class="kitten" id="kitten2"></div>
    <div class="message" id="msg"><span class="caret"></span></div>
    <button class="btn" id="askBtn" style="display:none;">Sm7ti lia? 🥺</button>
  </div>

  <!-- Screen 3: final -->
  <div class="screen" id="screen3">
    <div class="kitten happy" id="kitten3"></div>
    <h1 id="finalText" style="margin-top:18px; max-width: 92vw;">Thank you... bghit ghi nchof dik d7ka dyalk mn jdiiid ❤️🥹</h1>
  </div>
</div>

<!-- Kitten SVG template -->
<template id="kittenSVG">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- ears -->
    <polygon points="40,55 70,20 80,70" fill="#ffffff" stroke="#e9b8ce" stroke-width="2"/>
    <polygon points="160,55 130,20 120,70" fill="#ffffff" stroke="#e9b8ce" stroke-width="2"/>
    <polygon points="50,52 70,32 75,62" fill="#ffc1d8"/>
    <polygon points="150,52 130,32 125,62" fill="#ffc1d8"/>
    <!-- head -->
    <ellipse cx="100" cy="110" rx="70" ry="62" fill="#ffffff" stroke="#e9b8ce" stroke-width="2"/>
    <!-- cheeks -->
    <circle cx="60" cy="125" r="10" fill="#ffc8dc" opacity=".8"/>
    <circle cx="140" cy="125" r="10" fill="#ffc8dc" opacity=".8"/>
    <!-- eyes -->
    <ellipse class="eye" cx="78" cy="108" rx="6" ry="9" fill="#3a1f2e"/>
    <ellipse class="eye" cx="122" cy="108" rx="6" ry="9" fill="#3a1f2e"/>
    <circle cx="80" cy="105" r="2" fill="#fff"/>
    <circle cx="124" cy="105" r="2" fill="#fff"/>
    <!-- nose -->
    <path d="M96 122 L104 122 L100 128 Z" fill="#ff7ab0"/>
    <!-- mouth -->
    <path class="mouth" d="M85 132 Q100 142 115 132" stroke="#a44a73" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- whiskers -->
    <line x1="35" y1="130" x2="60" y2="132" stroke="#d9a3bb" stroke-width="1.5"/>
    <line x1="35" y1="138" x2="60" y2="138" stroke="#d9a3bb" stroke-width="1.5"/>
    <line x1="165" y1="130" x2="140" y2="132" stroke="#d9a3bb" stroke-width="1.5"/>
    <line x1="165" y1="138" x2="140" y2="138" stroke="#d9a3bb" stroke-width="1.5"/>
    <!-- pink bow -->
    <g transform="translate(135,55)">
      <path d="M0 0 Q-18 -14 -22 4 Q-18 18 0 8 Z" fill="#ff7ab0"/>
      <path d="M0 0 Q18 -14 22 4 Q18 18 0 8 Z" fill="#ff7ab0"/>
      <circle cx="0" cy="4" r="5" fill="#ff5fa1"/>
    </g>
  </svg>
</template>

<script>
(function(){
  // Inject kitten SVG into all .kitten containers
  const tpl = document.getElementById('kittenSVG');
  document.querySelectorAll('.kitten').forEach(k => {
    k.appendChild(tpl.content.cloneNode(true));
  });

  // Background hearts + sparkles
  const bg = document.getElementById('bgLayer');
  const fx = document.getElementById('fxLayer');
  const heartEmojis = ['🤍','💗','💖','🩷','💕'];
  function spawnHeart() {
    const h = document.createElement('div');
    h.className = 'heart-bg';
    h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.fontSize = (14 + Math.random()*22) + 'px';
    const dur = 8 + Math.random()*8;
    h.style.animationDuration = dur + 's';
    h.style.animationDelay = (-Math.random()*dur) + 's';
    bg.appendChild(h);
    setTimeout(()=>h.remove(), dur*1000 + 500);
  }
  for (let i=0;i<14;i++) spawnHeart();
  setInterval(spawnHeart, 900);

  function spawnSparkle() {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.style.left = Math.random()*100 + 'vw';
    s.style.top = Math.random()*100 + 'vh';
    s.style.animationDelay = (Math.random()*2) + 's';
    bg.appendChild(s);
    setTimeout(()=>s.remove(), 2600);
  }
  for (let i=0;i<20;i++) spawnSparkle();
  setInterval(spawnSparkle, 350);

  // Blinking for all kittens
  function blinkAll(){
    document.querySelectorAll('.kitten').forEach(k=>{
      k.classList.add('blink');
      setTimeout(()=>k.classList.remove('blink'), 140);
    });
  }
  setInterval(blinkAll, 3200);

  // ----- Audio: gentle piano via WebAudio (no external files) -----
  let audioCtx = null, musicGain = null, muted = false, musicTimer = null;
  function ensureAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      musicGain = audioCtx.createGain();
      musicGain.gain.value = 0.08;
      musicGain.connect(audioCtx.destination);
    } catch(e) {}
  }
  function playNote(freq, time, dur=1.2, type='sine', vol=1) {
    if (!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(0, time);
    g.gain.linearRampToValueAtTime(0.25*vol, time+0.02);
    g.gain.exponentialRampToValueAtTime(0.001, time+dur);
    o.connect(g); g.connect(musicGain);
    o.start(time); o.stop(time+dur+0.05);
  }
  // Simple lullaby loop in C major
  const melody = [
    [523.25,0.5],[659.25,0.5],[783.99,0.5],[659.25,0.5],
    [587.33,0.5],[783.99,0.5],[698.46,1.0],
    [523.25,0.5],[659.25,0.5],[523.25,0.5],[440.00,0.5],
    [392.00,1.5]
  ];
  function startMusic() {
    ensureAudio();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    let t = audioCtx.currentTime + 0.1;
    function schedule(){
      if (muted) return;
      melody.forEach(([f,d])=>{
        playNote(f, t, d*1.1, 'triangle', 1);
        // soft harmony fifth lower octave
        playNote(f/2, t, d*1.1, 'sine', 0.6);
        t += d;
      });
      musicTimer = setTimeout(schedule, (t - audioCtx.currentTime - 0.1)*1000);
    }
    schedule();
  }
  function chime() {
    ensureAudio();
    if (!audioCtx || muted) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    [1046.5, 1318.5, 1568].forEach((f,i)=>playNote(f, t+i*0.08, 0.6, 'sine', 0.8));
  }

  const muteBtn = document.getElementById('mute');
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '🔇' : '🔊';
    if (musicGain) musicGain.gain.value = muted ? 0 : 0.08;
  });

  // ----- Tiny floating hearts at kitten -----
  function tinyHeartsAt(el) {
    const r = el.getBoundingClientRect();
    for (let i=0;i<8;i++){
      const h = document.createElement('div');
      h.textContent = ['🤍','💗','💖'][i%3];
      h.style.position='absolute';
      h.style.left = (r.left + r.width/2 + (Math.random()*60-30)) + 'px';
      h.style.top  = (r.top + r.height/2) + 'px';
      h.style.fontSize = (14+Math.random()*14)+'px';
      h.style.transition = 'transform 1.4s ease, opacity 1.4s ease';
      h.style.opacity = '1';
      h.style.pointerEvents='none';
      fx.appendChild(h);
      requestAnimationFrame(()=>{
        h.style.transform = `translate(${(Math.random()*80-40)}px, -120px) scale(${.8+Math.random()*.6})`;
        h.style.opacity = '0';
      });
      setTimeout(()=>h.remove(),1500);
    }
  }

  // ----- Screen flow -----
  const s1 = document.getElementById('screen1');
  const s2 = document.getElementById('screen2');
  const s3 = document.getElementById('screen3');

  function show(screen) {
    [s1,s2,s3].forEach(s=>s.classList.remove('active'));
    screen.classList.add('active');
  }

  // wave on intro
  const k1 = document.getElementById('kitten1');
  k1.style.transition = 'transform .6s ease';
  let wave = 0;
  setInterval(()=>{
    wave = (wave+1)%2;
    k1.style.transform = wave ? 'rotate(-6deg)' : 'rotate(6deg)';
  }, 600);

  document.getElementById('startBtn').addEventListener('click', () => {
    startMusic();
    const k2 = document.getElementById('kitten2');
    show(s2);
    // walk in
    k2.style.transform = 'translateX(-40vw) scale(.6)';
    requestAnimationFrame(()=>{
      k2.classList.add('walk');
      k2.style.transform = 'translateX(0) scale(1)';
    });
    setTimeout(()=>{ k2.classList.add('happy'); tinyHeartsAt(k2); }, 1700);
    setTimeout(typeMessage, 2200);
  });

  // Typewriter
  const fullMsg = "Waaa safi alhbila 🥺🤍\n\nSmhi lia rah makantch 9ased njar7k.\n\nKnt jit 3ayan o darni rasi, bghit ndwi m3ak, nti knti bagha tmchi tna3si.\n\nSfy ana 9ltha bla man7s...\n\nWallah akhir mra n3awdha.\n\nMatkhafich. 🤍";
  function typeMessage(){
    const msg = document.getElementById('msg');
    msg.textContent = '';
    const caret = document.createElement('span');
    caret.className='caret';
    msg.appendChild(caret);
    let i = 0;
    function step(){
      if (i < fullMsg.length) {
        const ch = fullMsg[i++];
        caret.insertAdjacentText('beforebegin', ch);
        // small chime on punctuation
        if (ch === '🤍' || ch === '🥺') chime();
        const delay = ch === '\n' ? 220 : (ch === '.' || ch === ',' ? 140 : 38 + Math.random()*30);
        setTimeout(step, delay);
      } else {
        caret.remove();
        const ask = document.getElementById('askBtn');
        ask.style.display = 'inline-block';
        ask.style.animation = 'fadeIn .6s ease';
      }
    }
    step();
  }

  document.getElementById('askBtn').addEventListener('click', () => {
    show(s3);
    chime();
    // burst of hearts
    const k3 = document.getElementById('kitten3');
    tinyHeartsAt(k3);
    setTimeout(()=>tinyHeartsAt(k3), 400);
    setTimeout(()=>tinyHeartsAt(k3), 800);

    // glowing heart
    const gh = document.createElement('div');
    gh.className = 'glow-heart';
    gh.textContent = '💖';
    fx.appendChild(gh);
    requestAnimationFrame(()=>gh.classList.add('show'));

    // confetti
    const colors = ['#ff7ab0','#ffc1d8','#fff0f6','#ff5fa1','#ffe4ef','#ffd1e3'];
    for (let i=0;i<80;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = colors[i%colors.length];
      c.style.animationDuration = (2.5 + Math.random()*2.5) + 's';
      c.style.animationDelay = (Math.random()*0.8) + 's';
      c.style.transform = `rotate(${Math.random()*360}deg)`;
      fx.appendChild(c);
      setTimeout(()=>c.remove(), 6000);
    }
  });

  // Prevent double-tap zoom
  let lastTouch = 0;
  document.addEventListener('touchend', (e)=>{
    const now = Date.now();
    if (now - lastTouch <= 350) e.preventDefault();
    lastTouch = now;
  }, {passive:false});

})();
</script>
</body>
</html>
